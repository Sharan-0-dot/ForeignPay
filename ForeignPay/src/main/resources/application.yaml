spring:
  application:
    name: ForeignPay

  datasource:
    url: jdbc:postgresql://localhost:5432/foreignpay_db
    username: postgres
    password: Sharan@2005
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  sql:
    init:
      mode: always

  security:
    user:
      name: admin
      password: password

cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS}

jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID}
    secret: ${RAZORPAY_KEY_SECRET}

cloudinary:
  cloud:
    name: ${CLOUDINARY_CLOUD_NAME}
  api:
    key: ${CLOUDINARY_API_KEY}
    secret: ${CLOUDINARY_API_SECRET}

gemini:
  api:
    key: ${GEMINI_API_KEY}